spring:
  application:
    name: endpoint-insights-api
  datasource:
    url: jdbc:${DB_URI}
    username: ${DB_NAME}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none

  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:noreply@example.com}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

  security:
    oauth2:
      client:
        registration:
          oidc:
            client-id: ${OIDC_CLIENT_ID:endpoint-insights}
            client-secret: ${OIDC_CLIENT_SECRET:your-secret-here}
            redirect-uri:  ${OIDC_CLIENT_REDIRECT_URI:https://localhost:8080/oauth2/authorization/oidc}
            authorization-grant-type: authorization_code
            scope: openid,profile,email,groups
            client-name: OIDC
        provider:
          oidc:
            issuer-uri: ${OIDC_ISSUER_URI:https://auth.example.com}
            authorization-uri: ${OIDC_ISSUER_URI:https://auth.example.com}/api/oidc/authorization
            token-uri: ${OIDC_ISSUER_URI:https://auth.example.com}/api/oidc/token
            user-info-uri: ${OIDC_ISSUER_URI:https://auth.example.com}/api/oidc/userinfo
            jwk-set-uri: ${OIDC_ISSUER_URI:https://auth.example.com}/jwks.json
            user-name-attribute: preferred_username

jmeter:
  home: ${JMETER_HOME}

temp:
  dir: C:\temp

scheduling:
  pool-size: 10
  thread-name-prefix: TestBatchScheduler-

batches:
  stale-batch-threshold-seconds: 60

test-runs:
  purge-frequency:
    hours: 1
    minutes: 0
  max-age:
    days: 90
    hours: 0
    minutes: 0
    seconds: 0

app:
  authentication:
    enabled: true
    callback-uri: ${OID_CLIENT_CALLBACK_URI:https://d2wravsw1nwfu2.cloudfront.net/auth/callback}
    allowed-audiences: ${OIDC_ALLOWED_AUDIENCES:}
    groups:
      write: "ei:write"
      read: "ei:read"
    claims:
      username: ${AUTH_USERNAME_CLAIM:preferred_username}
      email: ${AUTH_EMAIL_CLAIM:email}
      groups: ${AUTH_GROUPS_CLAIM:groups}
  git:
    checkout-dir: ${GIT_CHECKOUT_DIR:./.git-checkouts}
  cors:
    allow-credentials: true
    allowed-methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowed-origins:
      - "https://d2wravsw1nwfu2.cloudfront.net"

# Springdoc OpenAPI / Swagger Configuration
springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    enabled: true
    path: /api
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    doc-expansion: list
  show-actuator: false
  use-fqn: false
  default-flat-param-object: true

---
spring:
  config:
    activate:
      on-profile: UNIX

temp:
  dir: /tmp/endpoint-insights

---
spring:
  config:
    activate:
      on-profile: PROD
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate

temp:
  dir: /tmp/endpoint-insights