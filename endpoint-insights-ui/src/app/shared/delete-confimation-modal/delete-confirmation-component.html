<h2 mat-dialog-title>Delete Batch</h2>

<mat-dialog-content>
    Are you sure you want to delete batch: <strong>"{{ data.batchName }}"</strong>?
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-raised-button class="dialog-btn-cancel" mat-dialog-close>Cancel</button>
    <button mat-raised-button class="dialog-btn-danger" data-test-id="confirm-delete-button" (click)="deleteBatch()">Delete</button>
</mat-dialog-actions>
