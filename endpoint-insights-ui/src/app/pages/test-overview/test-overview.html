<main>
    <h1 class="page-title">Tests</h1>
    <div class="button-container">
        <button mat-raised-button class="elevated-btn mat-elev-2" color="basic" (click)="openCreateJobModal()">
            <span>New Test</span>
            <mat-icon fontIcon="add"></mat-icon>
        </button>
        <div class="search-group">
            <div class="search-wrapper">
                <mat-icon class="search-icon">search</mat-icon>
                <mat-form-field class="search-field" appearance="outline" subscriptSizing="dynamic">
                    <input matInput [formControl]="searchControl" placeholder="Search by name or description">
                </mat-form-field>
            </div>
            <button class="filter-btn elevated-btn" [matMenuTriggerFor]="filterMenu"
                [matBadge]="hasActiveFilters ? selectedStatuses.size.toString() : ''" matBadgeSize="small" matBadgeColor="accent">
                <mat-icon>filter_list</mat-icon>
            </button>
            <mat-menu #filterMenu="matMenu">
                <div class="filter-menu-item" *ngFor="let s of JOB_STATUSES" (click)="toggleStatus(s); $event.stopPropagation()">
                    <mat-icon>{{ isStatusSelected(s) ? 'check_box' : 'check_box_outline_blank' }}</mat-icon>
                    <span>{{ s }}</span>
                </div>
            </mat-menu>
        </div>
    </div>
    <div class="test-list-container">
        <div class="test-header-row">
            <div class="test-headers">
                <h3>Test Name</h3>
                <h3>Date Created</h3>
                <h3>Created By</h3>
            </div>
        </div>
        <!-- List -->
        <div class="test-list">
            <div class="test-row" *ngFor="let t of filteredTests">
                <div class="cell name">
                    <span class="title">{{ t.name }}</span>
                    <span class="status" [ngClass]="t.status">{{ t.status }}</span>
                </div>
                <div class="cell date">{{ t.createdAt | date:'MMM d, y, h:mm a' }}</div>
                <div class="cell author">
                    @if (t.createdBy) {
                        <app-user-display
                            [name]="t.createdBy.name"
                            [subject]="t.createdBy.subject"
                            [issuer]="t.createdBy.issuer"
                        />
                    } @else {
                        <span>-</span>
                    }
                </div>

                <div class="cell actions" (click)="$event.stopPropagation()">
                    <button mat-icon-button class="elevated-btn mat-elev-2" aria-label="Run" (click)="onRun(t)"><mat-icon>play_arrow</mat-icon></button>
                    <button mat-icon-button class="elevated-btn mat-elev-2" aria-label="Run" (click)="onView(t)"><mat-icon>open_in_new</mat-icon></button>
                    <button mat-icon-button class="elevated-btn mat-elev-2" aria-label="Edit" (click)="onEdit(t)"><mat-icon>edit</mat-icon></button>
                    <button mat-icon-button class="elevated-btn mat-elev-2" aria-label="Delete" (click)="onDelete(t)"><mat-icon>delete</mat-icon></button>
                </div>
            </div>
        </div>
    </div>
</main>
