<h2 mat-dialog-title>Create New Job</h2>

<mat-dialog-content>
    <app-job-form (jobSubmitted)="onSubmit($event)"></app-job-form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-raised-button class="dialog-btn-cancel" (click)="onCancel()">Cancel</button>
    <button mat-raised-button class="dialog-btn-primary" (click)="createJobForm.submitForm()">Create Job</button>
</mat-dialog-actions>
