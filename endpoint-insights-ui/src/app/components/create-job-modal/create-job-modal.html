<h2 mat-dialog-title>Create New Job</h2>

<mat-dialog-content>
    <app-job-form (jobSubmitted)="onSubmit($event)"></app-job-form>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <div class="button-group">
        <button mat-raised-button class="create-job-modal-cancel-button" (click)="onCancel()">
            Cancel
        </button>
        <button mat-raised-button class="create-job-modal-create-button" (click)="createJobForm.submitForm()">
            Create Job
        </button>
    </div>
</mat-dialog-actions>
